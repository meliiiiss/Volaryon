<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volaryon - Mundo</title>

  <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

  <section class="hero">

 <div class="hero-content">

  <h1>VOLARYON</h1>

  <h2 id="playerName">Desperto...</h2>

  <p class="story">
    Você atravessou o Véu e agora está no mundo fragmentado.
  </p>

  <!-- 👇 AQUI ENTRA O MENU -->
  <div class="menu">
    <button onclick="location.href='lore.html'">📖 Lore</button>
    <button onclick="location.href='manual.html'">📘 Manual</button>
    <button onclick="location.href='bestiario.html'">🐉 Bestiário</button>
    <button onclick="location.href='ficha.html'">📄 Ficha</button>
  </div>

 </div>
  </section>

  <!-- 🔥 FIREBASE + PROTEÇÃO -->
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhAbXAIDT-W3tmBBSoAMW3aijvbOXUIgk",
    authDomain: "volaryon-3a9c6.firebaseapp.com",
    projectId: "volaryon-3a9c6",
    storageBucket: "volaryon-3a9c6.firebasestorage.app",
    messagingSenderId: "1039618171619",
    appId: "1:1039618171619:web:c5924e26a940b2e1a9dbd6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔒 PROTEÇÃO DA HOME
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById("playerName").innerText =
        "Bem-vindo, " + user.email;
    }
  });

  // 🚪 LOGOUT
  window.logout = function () {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  };
  </script>

</body>
</html>
