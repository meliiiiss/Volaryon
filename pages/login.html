<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Volaryon</title>

  <link rel="stylesheet" href="CSS/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>DESPERTAR</h1>

      <p class="story">
        Apenas aqueles tocados pelo Véu podem retornar ao mundo.
      </p>

      <div class="login-box">

        <div class="login-inputs">

          <input
            type="email"
            id="email"
            placeholder="E-mail"
            autocomplete="email"
          >

          <div class="senha-box">

            <input
              type="password"
              id="senha"
              placeholder="Senha"
              autocomplete="current-password"
            >

            <span class="olho" onclick="toggleSenha()">
              👁
            </span>

          </div>

        </div>

        <button onclick="entrar()">
          Entrar
        </button>

        <button
          class="novo-user"
          onclick="window.location.href='cadastro.html'"
        >
          Criar novo usuário
        </button>

      </div>

    </div>

  </section>

  <audio id="bgMusic" loop>
    <source src="assets/audio/musica.mp3" type="audio/mpeg">
  </audio>

  <div id="despertarTela" class="despertar-tela">

    <div class="despertar-overlay">

      <h1>🌑 DESPERTAR REALIZADO</h1>

      <p>O Véu respondeu ao seu chamado...</p>

    </div>

  </div>

  <script>

    function toggleSenha() {

      const senha = document.getElementById("senha");

      senha.type =
        senha.type === "password"
          ? "text"
          : "password";

    }

  </script>

  <script src="js/script.js"></script>

  <script type="module" src="js/auth.js"></script>

</body>

</html>
