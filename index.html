<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volaryon RPG</title>

  <link rel="stylesheet" href="CSS/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>VOLARYON</h1>

      <div id="story" class="story"></div>

      <button id="enterBtn" class="show" onclick="location.href='login.html'">
        🌑 Entrar no Mundo
      </button>

    </div>

</section>

  <!-- ÁUDIO -->
  <!-- seu HTML todo aqui -->

<audio id="bgMusic" loop>
  <source src="assets/audio/musica.mp3" type="audio/mpeg">
</audio>

<script>
let musicaIniciada = false;

window.addEventListener("DOMContentLoaded", () => {
  const music = document.getElementById("bgMusic");

  if (!music) return;

  music.volume = 0.4;
  music.loop = true;

  function iniciarMusica() {
    if (musicaIniciada) return;

    music.play().catch(() => {});
    musicaIniciada = true;

    document.removeEventListener("click", iniciarMusica);
  }

  document.addEventListener("click", iniciarMusica);
});
</script>
  
  <script src="js/script.js"></script>

</body>
</html>
