<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Volaryon — Oficial</title>
    <style>
        :root {
            --bg: #0b0c10;
            --panel: #111418;
            --panel-inner: #0a0b0d;
            --gold: #d7b35a;
            --gold-dark: #9c7a2e;
            --gold-low: rgba(215, 179, 90, 0.15);
            --line: rgba(215, 179, 90, 0.3);
            --text: #e6d3a3;
            --muted: #aab3c3;
            --radius: 12px;
            --shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(215, 179, 90, 0.05), transparent 60%);
            color: var(--text);
            font-family: 'Cinzel', serif, system-ui;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .sheet {
            max-width: 1200px;
            width: 100%;
            border: 1px solid var(--line);
            background: var(--panel);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        h2, h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin: 0 0 15px 0;
            border-bottom: 1px solid var(--gold-low);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* GRID LAYOUT */
        .top-row {
            display: grid;
            grid-template-columns: 320px 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel-inner);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        /* INPUTS */
        label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold-dark);
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--line);
            color: white;
            padding: 8px;
            border-radius: 4px;
            margin-top: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: var(--gold);
            outline: none;
        }

        /* ATRIBUTOS */
        .stat-row {
            display: grid;
            grid-template-columns: 80px 1fr 60px;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            background: rgba(215, 179, 90, 0.03);
            padding: 5px 10px;
            border-radius: 6px;
        }

        .mod-box {
            color: var(--gold);
            font-weight: bold;
            text-align: center;
            font-size: 1.1em;
        }

        /* IMAGEM */
        .img-box {
            width: 100%;
            height: 320px;
            border: 1px dashed var(--line);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
        }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* BÊNÇÃO */
        .blessing-box {
            background: linear-gradient(135deg, rgba(215, 179, 90, 0.1), transparent);
            border: 1px solid var(--gold-dark);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
        }

        .btn-roll {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.3s;
            width: 100%;
        }

        .btn-roll:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--gold);
        }

        /* HABILIDADES */
        .hab-box {
            border: 1px solid var(--line);
            background: rgba(0,0,0,0.3);
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--gold);
        }

        @media (max-width: 900px) {
            .top-row, .bottom-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sheet">
    <!-- CABEÇALHO / TOPO -->
    <section class="top-row">
        <!-- ARTE -->
        <article class="panel">
            <h3>Arte</h3>
            <div class="img-box" id="img-display">
                <span id="placeholder-text" style="color:var(--line); font-size: 12px;">Selecione uma imagem</span>
                <img id="preview">
            </div>
            <input type="file" accept="image/*" onchange="carregarImagem(event)">
        </article>

        <!-- INFO BÁSICA -->
        <article class="panel">
            <h3>Identidade</h3>
            <label>Nome do Personagem</label>
            <input type="text" placeholder="Ex: Selene">
            
            <label>Raça</label>
            <select id="raca" onchange="aplicarRaca()">
                <option value="">Escolher...</option>
                <option value="Humano">Humano</option>
                <option value="Elfyr">Elfyr</option>
                <option value="Durkhan">Durkhan</option>
                <option value="Sylvaris">Sylvaris</option>
                <option value="Infernyx">Infernyx</option>
                <option value="Aurion">Aurion</option>
            </select>

            <label>Sub-raça</label>
            <select id="subraca" onchange="aplicarSubRaca()">
                <option value="">—</option>
            </select>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <label>Classe</label>
                    <input type="text">
                </div>
                <div>
                    <label>Defesa (CA)</label>
                    <div class="mod-box" style="font-size:24px; border:1px solid var(--gold-low); padding:5px; margin-top:4px;" id="ca">10</div>
                </div>
            </div>
        </article>

        <!-- SORTEIO DO DEUS -->
        <article class="panel">
            <h3>Bênção Divina</h3>
            <div class="blessing-box">
                <div id="deus-nome" style="font-weight:bold; font-size:18px; color:var(--gold); margin-bottom:10px;">Toque no Destino</div>
                <button class="btn-roll" onclick="sortearDeus()">Sortear (1d25)</button>
                <p id="deus-efeito" style="font-size:12px; margin-top:10px; opacity:0.8;">Role para descobrir qual entidade marcou seu núcleo.</p>
            </div>
            <label>Notas Rápidas</label>
            <textarea rows="4" placeholder="Alguma bênção adicional ou característica..."></textarea>
        </article>
    </section>

    <!-- MEIO / GRID PRINCIPAL -->
    <section class="bottom-grid">
        <!-- ATRIBUTOS -->
        <article class="panel">
            <h3>Atributos <span id="pontos" style="font-size:10px; color:var(--gold)">Pontos: 30</span></h3>
            <div class="stat-row"><span>FOR</span><input id="for" type="number" value="5"><span class="mod-box" id="mfor">+0</span></div>
            <div class="stat-row"><span>AGI</span><input id="agi" type="number" value="5"><span class="mod-box" id="magi">+0</span></div>
            <div class="stat-row"><span>RES</span><input id="res" type="number" value="5"><span class="mod-box" id="mres">+0</span></div>
            <div class="stat-row"><span>ENE</span><input id="ene" type="number" value="5"><span class="mod-box" id="mene">+0</span></div>
            <div class="stat-row"><span>PER</span><input id="per" type="number" value="5"><span class="mod-box" id="mper">+0</span></div>
            <p style="font-size:10px; opacity:0.6; margin-top:15px;">* Atributos iniciais: base 5 + 30 pontos para distribuir.</p>
        </article>

        <!-- HABILIDADES -->
        <article class="panel">
            <h3>Habilidades</h3>
            <div id="habilidades-lista" style="height:400px; overflow-y:auto; padding-right:5px;">
                <!-- Gerado por JS -->
            </div>
        </article>

        <!-- HISTÓRIA -->
        <article class="panel">
            <h3>Biografia</h3>
            <textarea rows="22" placeholder="Descreva seu passado, objetivos e conexões com o mundo de Volaryon..."></textarea>
        </article>
    </section>
</div>

<script>
    const BASE = 5;
    const TOTAL_PONTOS = 30;
    const atributos = ["for", "agi", "res", "ene", "per"];

    // NOVOS DEUSES ORIGINAIS
    const listaDeuses = [
        "Vorg-Xath (Gravidade)", "Khyllos (Portais)", "Zyn-Turok (Combate)", 
        "Oevari (Claridade)", "Xur-Ghaal (Decomposição)", "Myr-Vonn (Ressonância)", 
        "Jhaz-Kur (Vigor)", "Vaelen-Thys (Ordem)", "Grymx (Resistência)", 
        "Nyth-Ael (Inconsciente)", "Ryn-Zar (Magnetismo)", "Esh-Mora (Sacrifício)", 
        "Dra-Vulk (Profundezas)", "Syll-Ith (Crescimento)", "Hek-Vahl (Leis)", 
        "Ulyth (Ocultismo)", "Vorn-Kyra (Estrutura)", "Az-Rhyon (Espaço)", 
        "Kael-Zunn (Inverno)", "Bha-Ghul (Erosão)", "Myr-Dax (Antiguidade)", 
        "Phyx (Fluxo)", "Ynn-Sora (Instinto)", "Zar-Koth (Verdade)", 
        "Vol-Aeryn (Origem)"
    ];

    const racas = {
        Sylvaris: { bonus:{ene:1,res:1}, sub:[{nome:"Bestialis", b:{for:2}}, {nome:"Aeralis", b:{agi:2}}, {nome:"Serphetes", b:{per:2}}, {nome:"Amphiras", b:{res:2}}, {nome:"Thalassyn", b:{ene:2}}] },
        Infernyx: { bonus:{ene:2,for:1}, sub:[{nome:"Sanguinarch", b:{ene:2}}, {nome:"Nachryx", b:{for:2}}, {nome:"Damazti", b:{res:2}}, {nome:"Bansharyn", b:{per:2}},  {nome:"Linchnyx", b:{ene:2}},
        {nome:"Dyabrin", b:{for:2}}, {nome:"Cyclonyx", b:{ene:2}}, {nome:"Gargonyx", b:{res:2}}] },                                     
        Elfyr: { bonus:{ene:1,res:1}, sub:[{nome:"Forestis", b:{ene:1}}, {nome:"Lunaris", b:{agi:2}}] },
        Durkhan: { bonus:{for:2,res:1}, sub:[{nome:"Ferrun", b:{for:2}}, {nome:"Everest", b:{res:2}}] },
        Humano: { bonus:{for:1,agi:1,res:1}, sub:[{nome:"Versátil", b:{}}] }
    };

    function carregarImagem(e) {
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(e.target.files[0]);
        preview.style.display = 'block';
        document.getElementById('placeholder-text').style.display = 'none';
    }

    function sortearDeus() {
        const r = Math.floor(Math.random() * 25);
        document.getElementById("deus-nome").innerText = `D25: ${r + 1} - ${listaDeuses[r]}`;
        document.getElementById("deus-efeito").innerText = "Sua alma foi marcada. Os bônus desta entidade devem ser consultados com o Mestre.";
    }

    function aplicarRaca() {
        let r = racas[document.getElementById("raca").value];
        let sub = document.getElementById("subraca");
        sub.innerHTML = '<option value="">—</option>';
        if(!r) return;
        r.sub.forEach(s => {
            let o = document.createElement("option");
            o.value = s.nome; o.textContent = s.nome;
            sub.appendChild(o);
        });
        calc();
    }

    function mod(v) { return Math.floor((v - 10) / 2); }

    function calc() {
        let gasto = 0;
        atributos.forEach(a => {
            let v = +document.getElementById(a).value;
            gasto += (v - BASE);
            let m = mod(v);
            document.getElementById("m" + a).innerText = (m >= 0 ? "+" : "") + m;
        });
        document.getElementById("pontos").innerText = "Pontos: " + (TOTAL_PONTOS - gasto);
        document.getElementById("ca").innerText = 10 + mod(+document.getElementById("agi").value);
    }

    function criarHabs() {
        const lista = document.getElementById("habilidades-lista");
        for(let i=1; i<=6; i++) {
            let div = document.createElement("div");
            div.className = "hab-box";
            div.innerHTML = `
                <input placeholder="Habilidade ${i}" style="border:none; padding:0; background:transparent; font-weight:bold; color:var(--gold);">
                <textarea placeholder="Descrição do efeito..." style="border:none; padding:0; background:transparent; font-size:12px; height:40px; margin-top:5px;"></textarea>
            `;
            lista.appendChild(div);
        }
    }

    // Init
    atributos.forEach(a => document.getElementById(a).addEventListener("input", calc));
    criarHabs();
    calc();
</script>

</body>
</html>
