<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volaryon - Dashboard</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="ativos/vídeos/snaptik_7588938927608794399_hd.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <header class="topbar">
        <div class="profile-box">
            <div class="profile-avatar"></div>
            <div class="profile-info">
                <h3 id="displayNome">Melissa</h3>
                <div class="xp-container">
                    <div class="xp-bar"><div class="xp-fill" style="width: 10%;"></div></div>
                    <span>Nível 1 • Desperta</span>
                </div>
            </div>
        </div>
        
        <div class="top-resources">
            <div class="resource">
                <span class="resource-icon">🪙</span>
                <span id="gold-count">150</span>
            </div>
            <button class="config-btn" onclick="location.href='config.html'">⚙️</button>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <span class="subtitle">Crônicas de Volaryon</span>
            <h1>VOLARYON</h1>
            <p>O Núcleo de Xur-Ghaal começou a pulsar. O destino dos Despertos está traçado sob a luz dos Deuses antigos.</p>
            
            <button class="play-btn" onclick="location.href='ficha.html'">
                ▶ CONTINUAR JORNADA
            </button>
        </div>
    </main>

    <nav class="bottom-menu">
        <button class="menu-item" onclick="location.href='manual.html'">📚 Manual</button>
        <button class="menu-item" onclick="location.href='bestiario.html'">🐉 Bestiário</button>
        <button class="menu-item active" onclick="location.href='ficha.html'">⚔️ Ficha</button>
        <button class="menu-item" onclick="location.href='mochila.html'">🎒 Mochila</button>
    </nav>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const save = localStorage.getItem('volaryon_save');
            if (save) {
                const dados = JSON.parse(save);
                if (dados.info.nome) {
                    document.getElementById('displayNome').innerText = dados.info.nome;
                }
            }
        });
    </script>
</body>
</html>
