<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Volaryon</title>

  <link rel="stylesheet" href="CSS/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>DESPERTAR</h1>

      <p class="story">
        Apenas aqueles tocados pelo Véu podem retornar ao mundo.
      </p>

      <!-- LOGIN -->
      <div class="login-box">

        <div class="login-inputs">

          <input type="email" id="email" placeholder="E-mail">

          <div class="senha-box">
            <input type="password" id="senha" placeholder="Senha">
            <span class="olho" onclick="toggleSenha()">👁</span>
          </div>

        </div>

        <button onclick="entrar()">Entrar</button>

        <!-- NOVO USUÁRIO -->
        <button class="novo-user" onclick="window.location.href='cadastro.html'">
  Criar novo usuário
        </button>

      </div>

    </div>

  </section>

  <!-- 🎧 ÁUDIO -->
  <audio id="bgMusic" loop>
    <source src="assets/audio/musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    let tocou = false;

    // música ao clicar
    window.addEventListener("click", () => {
      if (!tocou) {
        const music = document.getElementById("bgMusic");

        if (music) {
          music.volume = 0.4;
          music.play().catch(() => {});
        }

        tocou = true;
      }
    });

    function toggleSenha() {
      const senha = document.getElementById("senha");
      senha.type = senha.type === "password" ? "text" : "password";
    }

    function entrar() {
      alert("Login ainda não conectado ao sistema");
    }

    function novoUsuario() {
      alert("Sistema de criação de conta ainda não ativado");
    }
  </script>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
