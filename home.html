<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Volaryon • Home</title>

  <link rel="stylesheet" href="CSS/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">

</head>

<body>

  <!-- FUNDO VIDEO -->

  <video
    class="bg-video"
    autoplay
    muted
    loop
    playsinline
  >

    <source
      src="assets/videos/snaptik_7588938927608794399_hd.mp4"
      type="video/mp4"
    >

  </video>

  <!-- OVERLAY -->

  <div class="bg-overlay"></div>

  <!-- CONTEÚDO -->

  <section class="home-container">

  <!-- HUD -->

  <div class="home-ui">

    <!-- TOPO -->

    <header class="topbar">

      <div class="logo-area">

        <h1>VOLARYON</h1>

        <span>O Véu Desperto</span>

      </div>

      <div class="profile-area">

        <div class="profile-circle"></div>

        <div class="profile-info">
          <h3>Desperto</h3>
          <p>Nível 1</p>
        </div>

      </div>

    </header>

    <!-- CENTRO -->

    <main class="main-panel">

      <!-- ESQUERDA -->

      <aside class="side-menu">

        <button>▶ Jogar</button>

        <button>⚔ Grimório</button>

        <button>🎒 Inventário</button>

        <button>🜂 Habilidades</button>

        <button>👁 Clãs</button>

        <button>⚙ Configurações</button>

      </aside>

      <!-- DIREITA -->

      <section class="news-panel">

        <div class="news-card large">

          <h2>🌑 O Véu se rompeu</h2>

          <p>
            Criaturas ancestrais começaram a surgir nas regiões esquecidas de Elarion.
          </p>

        </div>

        <div class="news-grid">

          <div class="news-card">
            <h3>⚔ Evento</h3>
            <p>As Ruínas Carmesins foram abertas.</p>
          </div>

          <div class="news-card">
            <h3>🜂 Atualização</h3>
            <p>Novo sistema de Núcleos Primordiais.</p>
          </div>

        </div>

      </section>

    </main>

  </div>

  </section>

  <!-- ÁUDIO -->

  <audio id="bgMusic" loop>

    <source
      src="assets/audio/musica.mp3"
      type="audio/mpeg"
    >

  </audio>

  <!-- SCRIPT -->

  <script src="js/script.js"></script>

</body>

</html>
