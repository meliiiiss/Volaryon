<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ficha Volaryon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0b0c10;
    color:#e6d3a3;
    font-family:'EB Garamond', serif;
}

.sheet{
    max-width:1200px;
    margin:auto;
    padding:20px;
    border:1px solid #c9a85d;
}

.top{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:10px;
}

.panel{
    border:1px solid #c9a85d;
    padding:10px;
    background:#111;
}

.title{
    text-align:center;
    font-family:'Cinzel';
    font-size:40px;
    color:#c9a85d;
}

input, textarea, select{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid #c9a85d;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
    margin-top:10px;
}

.stats{
    display:grid;
    gap:5px;
}

.stat{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #c9a85d;
}

@media(max-width:900px){
    .top{grid-template-columns:1fr;}
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="sheet">

<div class="top">

<div class="panel">
<p>ARTE</p>
</div>

<div class="panel">

<h1 class="title">NOME</h1>

<p><b>Raça:</b>
<select id="raca" onchange="aplicarRaca()">
<option value="">Escolher</option>
<option value="Humano">Humano</option>
<option value="Lunari">Lunari</option>
<option value="Ferrun">Ferrun</option>
<option value="Vulperico">Vulperico</option>
<option value="Drakyn">Drakyn</option>
</select>
</p>

<p><b>Classe:</b> <input></p>

</div>

<div class="panel">
<textarea rows="10" placeholder="Descrição"></textarea>
</div>

</div>

<div class="grid">

<div class="panel">
<h3>ATRIBUTOS</h3>

<div class="stats">
<div class="stat">FOR <input id="for" type="number" value="5"></div>
<div class="stat">AGI <input id="agi" type="number" value="5"></div>
<div class="stat">RES <input id="res" type="number" value="5"></div>
<div class="stat">ENE <input id="ene" type="number" value="5"></div>
<div class="stat">PER <input id="per" type="number" value="5"></div>
</div>

<p id="pontos">Pontos restantes: 30</p>

</div>

<div class="panel">
<h3>HABILIDADES</h3>
<textarea rows="10"></textarea>
</div>

<div class="panel">
<h3>HISTÓRIA</h3>
<textarea rows="10"></textarea>
</div>

</div>

</div>

<script>

// CONFIG
const BASE = 5;
const MAX = 15;
const TOTAL = 30;

const atributos = ["for","agi","res","ene","per"];

// RAÇAS
const racas = {

Humano:{bonus:{for:1, agi:1}},
Lunari:{bonus:{per:2, agi:1}},
Ferrun:{bonus:{res:2, for:1}},
Vulperico:{bonus:{agi:2, per:1}},
Drakyn:{bonus:{for:2, ene:1}}

};

// RESET BASE
function resetBase(){
    atributos.forEach(a=>{
        document.getElementById(a).value = BASE;
    });
}

// APLICAR RAÇA
function aplicarRaca(){

    let r = document.getElementById("raca").value;

    if(!racas[r]) return;

    resetBase();

    let bonus = racas[r].bonus;

    for(let a in bonus){
        let el = document.getElementById(a);
        el.value = parseInt(el.value) + bonus[a];
    }

    calcular();
}

// CALCULAR PONTOS
function calcular(){

    let total = 0;

    atributos.forEach(a=>{
        total += parseInt(document.getElementById(a).value) || 0;
    });

    let usados = total - (BASE*5);
    let resto = TOTAL - usados;

    document.getElementById("pontos").innerText = "Pontos restantes: " + resto;

}

// EVENTOS
window.onload = ()=>{
    atributos.forEach(a=>{
        document.getElementById(a).addEventListener("input", calcular);
    });
};

</script>

</body>
</html>
