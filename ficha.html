<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha Volaryon</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #0e111a;
    color: #e8d8a8;
}

/* LAYOUT PRINCIPAL */
.container {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
}

/* ESQUERDA */
.left {
    background: #111;
    padding: 15px;
    border-right: 2px solid #c9a85d;
}

.avatar {
    width: 100%;
    height: 250px;
    background: #222;
    border: 2px solid #c9a85d;
    margin-bottom: 10px;
}

.left input {
    width: 100%;
    margin-bottom: 5px;
}

/* DIREITA */
.right {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* BOXES */
.box {
    border: 1px solid #c9a85d;
    padding: 10px;
    background: #151a25;
}

.box h3 {
    margin-top: 0;
    border-bottom: 1px solid #c9a85d;
}

/* INPUTS */
input, textarea {
    width: 100%;
    background: #0e111a;
    border: 1px solid #c9a85d;
    color: #fff;
    margin-top: 3px;
}

textarea {
    resize: none;
}
</style>
</head>

<body>

<div class="container">

<!-- ESQUERDA -->
<div class="left">

<div class="avatar"></div>

<input placeholder="Nome">
<input placeholder="Raça">
<input placeholder="Classe">
<input placeholder="Nível">
<input placeholder="Rank do Núcleo">

<h3>Bênção</h3>
<input placeholder="Deus">
<textarea placeholder="Efeito"></textarea>

</div>

<!-- DIREITA -->
<div class="right">

<div class="box">
<h3>Atributos</h3>
Força <input type="number">
Agilidade <input type="number">
Resistência <input type="number">
Energia <input type="number">
Percepção <input type="number">
</div>

<div class="box">
<h3>Status</h3>
HP <input>
Energia <input>
Defesa <input>
Velocidade <input>
</div>

<div class="box">
<h3>Núcleo</h3>
Tipo <input>
Estado <input>
<textarea placeholder="Efeito"></textarea>
</div>

<div class="box">
<h3>Habilidades</h3>
<textarea placeholder="Habilidade 1"></textarea>
<textarea placeholder="Habilidade 2"></textarea>
</div>

<div class="box">
<h3>Equipamentos</h3>
<textarea></textarea>
</div>

<div class="box">
<h3>História</h3>
<textarea></textarea>
</div>

<!-- ROLAGEM -->
<div class="box">
<h3>🎲 Dados</h3>

<button onclick="rolarD20()">D20</button>
<p id="d20"></p>

<button onclick="rolarDano()">Dano</button>
<select id="tipo">
<option value="6">3d6</option>
<option value="4">3d4</option>
</select>
<p id="dano"></p>

</div>

</div>

</div>

<script>
function rolarD20(){
 let r = Math.floor(Math.random()*20)+1;
 document.getElementById("d20").innerText = "Resultado: " + r;
}

function rolarDano(){
 let tipo = document.getElementById("tipo").value;
 let total = 0;
 let rolls = [];

 for(let i=0;i<3;i++){
   let r = Math.floor(Math.random()*tipo)+1;
   rolls.push(r);
   total += r;
 }

 document.getElementById("dano").innerText =
 "Rolagens: " + rolls.join(", ") + " | Total: " + total;
}
</script>

</body>
</html>
