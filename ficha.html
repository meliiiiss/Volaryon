<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volaryon | Ficha do Desperto</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/deuses.css">
</head>
<body class="page-ficha">
    <div class="overlay-vignette"></div>

    <main class="ficha-wrapper">
        <aside class="panel-stats">
            <div class="panel-header">ATRIBUTOS</div>
            <div class="stat-item"><span>FOR</span><input type="number" id="for" value="10" onchange="atualizarFicha()"><b id="mod-for">+0</b></div>
            <div class="stat-item"><span>AGI</span><input type="number" id="agi" value="10" onchange="atualizarFicha()"><b id="mod-agi">+0</b></div>
            <div class="stat-item"><span>RES</span><input type="number" id="res" value="10" onchange="atualizarFicha()"><b id="mod-res">+0</b></div>
            <div class="stat-item"><span>ENE</span><input type="number" id="ene" value="10" onchange="atualizarFicha()"><b id="mod-ene">+0</b></div>
            <div class="stat-item"><span>PER</span><input type="number" id="per" value="10" onchange="atualizarFicha()"><b id="mod-per">+0</b></div>
        </aside>

        <section class="panel-center">
            <h1 class="logo-ficha">VOLARYON</h1>
            
            <div class="character-frame">
                <div class="roleta-container">
                    <div class="roleta-wrapper">
                        <div id="roleta-track" class="roleta-track"></div>
                        <div class="marcador-divino"></div>
                    </div>
                </div>
                <div id="resultado-deus" class="nome-deus-anim">Aguardando Invocação...</div>
            </div>

            <div class="action-bar">
                <button id="btn-sortear" class="btn-invocar">INVOCAR DIVINDADE</button>
            </div>
        </section>

        <aside class="panel-info">
            <div class="status-box">
                <div class="bar-group">
                    <label>VITALIDADE (PV)</label>
                    <div class="bar-bg"><div id="bar-hp" class="bar-fill hp"></div></div>
                    <span id="txt-hp">100/100</span>
                </div>
                <div class="bar-group">
                    <label>NÚCLEO (ENERGIA)</label>
                    <div class="bar-bg"><div id="bar-ene" class="bar-fill ene"></div></div>
                    <span id="txt-ene">50/50</span>
                </div>
                <div class="bar-group">
                    <label>CORRUPÇÃO</label>
                    <div class="bar-bg"><div id="bar-corrup" class="bar-fill corrup"></div></div>
                    <span id="txt-corrup">0%</span>
                </div>
            </div>

            <div class="select-box">
                <select id="select-raca" onchange="atualizarFicha()">
                    <option value="">RAÇA</option>
                </select>
                <select id="select-classe" onchange="atualizarFicha()">
                    <option value="">CLASSE</option>
                </select>
            </div>
            
            <div id="habilidade-raca" class="desc-box">Selecione uma linhagem...</div>
        </aside>
    </main>

    <script src="js/ficha_logica.js"></script>
</body>
</html>
