<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Volaryon</title>

  <link rel="stylesheet" href="CSS/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>DESPERTAR</h1>

      <p class="story">
        Apenas aqueles tocados pelo Véu podem retornar ao mundo.
      </p>

      <div class="login-box">

        <input type="text" placeholder="Nome do Desperto">

        <input type="password" placeholder="Código do Véu">

        <div class="buttons">

          <button>
            ⚔️ Entrar no Volaryon
          </button>

          <button class="novo-user" onclick="location.href='login.html'">
            🩸 Novo Usuário
          </button>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
