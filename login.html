<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Volaryon</title>

  <link rel="stylesheet" href="CSS/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>DESPERTAR</h1>

      <p class="story">
        Apenas aqueles tocados pelo Véu podem retornar ao mundo.
      </p>

      <!-- LOGIN -->
      <div class="login-box">

        <div class="login-inputs">

          <input type="text" placeholder="Nome de usuário">

          <div class="senha-box">
            <input type="password" id="senha" placeholder="Senha">
            <span class="olho" onclick="toggleSenha()">👁</span>
          </div>

        </div>

        <button onclick="entrar()">Entrar</button>

      </div>

    </div>

  </section>

  <!-- SCRIPT -->
  <script>
    function toggleSenha() {
      const senha = document.getElementById("senha");

      senha.type = senha.type === "password" ? "text" : "password";
    }

    function entrar() {
      alert("Login ainda não conectado ao sistema (Firebase ou backend)");
    }
  </script>

</body>
</html>
