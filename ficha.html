<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ficha Volaryon</title>

<style>
body{
    background:#0b0c10;
    color:#e6d3a3;
    font-family:serif;
}
.panel{
    border:1px solid #c9a85d;
    padding:10px;
    margin:10px;
}
</style>
</head>

<body>

<div class="panel">

<h2>Ficha</h2>

<p><b>Raça:</b>
<select id="raca" onchange="aplicarRaca()">
<option value="">Escolher</option>
<option value="Humano">Humano</option>
<option value="Elfyr">Elfyr</option>
<option value="Durkhan">Durkhan</option>
<option value="Aurion">Aurion</option>
<option value="Drakyn">Drakyn</option>
<option value="Sylvaris">Sylvaris</option>
<option value="Infernyx">Infernyx</option>
</select>
</p>

<p><b>Sub-raça:</b>
<select id="subraca">
<option value="">—</option>
</select>
</p>

<h3>Atributos</h3>

FOR <input id="for" type="number" value="5"><br>
AGI <input id="agi" type="number" value="5"><br>
RES <input id="res" type="number" value="5"><br>
ENE <input id="ene" type="number" value="5"><br>
PER <input id="per" type="number" value="5"><br>

<p id="pontos">Pontos: 30</p>

</div>

<script>
const BASE = 5;
const TOTAL = 30;
const atributos = ["for","agi","res","ene","per"];

const racas = {

Humano:{bonus:{for:1,agi:1}},

Elfyr:{
    bonus:{per:1,agi:1},
    subracas:[
        {nome:"Forestis", bonus:{ene:1}},
        {nome:"Lunari", bonus:{agi:1}}
    ]
},

Durkhan:{
    bonus:{res:2,for:1},
    subracas:[
        {nome:"Ferrun", bonus:{for:1}},
        {nome:"Everest", bonus:{res:1}}
    ]
},

Aurion:{bonus:{agi:2,ene:1}},

Drakyn:{bonus:{for:2,ene:1}},

Sylvaris:{
    bonus:{ene:1,res:1},
    subracas:[
        {nome:"Bestialis", bonus:{for:2}},
        {nome:"Aeralis", bonus:{agi:2}},
        {nome:"Serpentes", bonus:{per:2}},
        {nome:"Amphira", bonus:{res:2}},
        {nome:"Thalassyn", bonus:{ene:2}}
    ]
},

Infernyx:{
    bonus:{ene:2,for:1},
    subracas:[
        {nome:"Sanguinarch", bonus:{ene:2,per:1}},
        {nome:"Bansharyn", bonus:{ene:2,per:1}},
        {nome:"Lichnyx", bonus:{ene:3}},
        {nome:"Nachryx", bonus:{for:2,res:1}},
        {nome:"Damazti", bonus:{ene:2,res:1}},
        {nome:"Diabryn", bonus:{for:2,ene:1}},
        {nome:"Cyclonyx", bonus:{per:2,res:1}},
        {nome:"Gargonyx", bonus:{res:3}}
    ]
}

};

// RESET
function resetBase(){
    atributos.forEach(a=>{
        document.getElementById(a).value = BASE;
    });
}

// RAÇA
function aplicarRaca(){

    resetBase();

    let nome = document.getElementById("raca").value;
    let r = racas[nome];

    let sub = document.getElementById("subraca");
    sub.innerHTML = '<option value="">—</option>';

    if(!r) return;

    // bônus base
    for(let a in r.bonus){
        document.getElementById(a).value =
        +document.getElementById(a).value + r.bonus[a];
    }

    // criar sub-raças
    if(r.subracas){
        r.subracas.forEach(s=>{
            let opt = document.createElement("option");
            opt.value = s.nome;
            opt.textContent = s.nome;
            sub.appendChild(opt);
        });

        sub.onchange = ()=> aplicarSubRaca(nome);
    }

    calcular();
}

// SUB-RAÇA
function aplicarSubRaca(nome){

    let subNome = document.getElementById("subraca").value;
    let r = racas[nome];

    if(!r || !r.subracas) return;

    resetBase();

    // bônus raça
    for(let a in r.bonus){
        document.getElementById(a).value =
        +document.getElementById(a).value + r.bonus[a];
    }

    let s = r.subracas.find(x=>x.nome==subNome);
    if(!s) return;

    // bônus sub
    for(let a in s.bonus){
        document.getElementById(a).value =
        +document.getElementById(a).value + s.bonus[a];
    }

    calcular();
}

// CALCULO
function calcular(){
    let total = 0;

    atributos.forEach(a=>{
        total += parseInt(document.getElementById(a).value) || 0;
    });

    let usados = total - (BASE*5);
    let resto = TOTAL - usados;

    document.getElementById("pontos").innerText =
    "Pontos restantes: " + resto;
}

// INIT
window.onload = ()=>{
    atributos.forEach(a=>{
        document.getElementById(a).addEventListener("input", calcular);
    });
};
        


</script>

</body>
</html>
