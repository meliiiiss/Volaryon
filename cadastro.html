<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Volaryon</title>

  <link rel="stylesheet" href="CSS/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <div class="hero-content">

      <h1>DESPERTAR</h1>

      <p class="story">
        Crie sua existência no mundo de Volaryon.
      </p>

      <!-- CADASTRO -->
      <div class="login-box">

        <div class="login-inputs">

          <input type="text" id="usuario" placeholder="Nome de usuário">
          <input type="email" id="email" placeholder="E-mail">

          <div class="senha-box">
            <input type="password" id="senha" placeholder="Senha">
            <span class="olho" onclick="toggleSenha('senha')">👁</span>
          </div>

          <div class="senha-box">
            <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
            <span class="olho" onclick="toggleSenha('confirmarSenha')">👁</span>
          </div>

        </div>

        <button onclick="criarConta()">Criar conta</button>

        <button class="novo-user" onclick="voltarLogin()">
          Já tenho conta
        </button>

      </div>

    </div>

  </section>

  <!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhAbXAIDT-W3tmBBSoAMW3aijvbOXUIgk",
  authDomain: "volaryon-3a9c6.firebaseapp.com",
  projectId: "volaryon-3a9c6",
  storageBucket: "volaryon-3a9c6.firebasestorage.app",
  messagingSenderId: "1039618171619",
  appId: "1:1039618171619:web:c5924e26a940b2e1a9dbd6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 CADASTRO REAL
window.criarConta = function () {

  const usuario = document.getElementById("usuario").value;
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const confirmar = document.getElementById("confirmarSenha").value;

  if (!usuario || !email || !senha || !confirmar) {
    alert("Preencha todos os campos!");
    return;
  }

  if (senha !== confirmar) {
    alert("As senhas não coincidem!");
    return;
  }

  if (senha.length < 6) {
    alert("Senha precisa ter pelo menos 6 caracteres!");
    return;
  }

  createUserWithEmailAndPassword(auth, email, senha)
    .then(() => {
      alert("Conta criada com sucesso!");
      window.location.href = "login.html";
    })
    .catch((error) => {
      alert("Erro: " + error.message);
    });
}

// 👁 OLHO DA SENHA
window.toggleSenha = function (id) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

// 🔙 voltar login
window.voltarLogin = function () {
  window.location.href = "login.html";
}
</script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
