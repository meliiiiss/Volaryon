<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha Volaryon</title>

<style>
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    background: #0d0f14;
    color: #e6d3a3;
}

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
}

.left {
    border-right: 2px solid #c9a85d;
    padding: 10px;
}

.avatar {
    width: 100%;
    height: 260px;
    border: 2px solid #c9a85d;
    margin-bottom: 10px;
    background: #222;
}

.left input {
    width: 100%;
    margin-bottom: 5px;
}

.right {
    padding: 10px;
}

.row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-bottom: 5px;
}

.box {
    border: 1px solid #c9a85d;
    padding: 5px;
}

.box input, .box textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
}

.title {
    text-align: center;
    border-bottom: 2px solid #c9a85d;
    margin-bottom: 10px;
}

/* NOVO */
.atributo {
  display:flex;
  align-items:center;
  gap:5px;
}

.atributo button{
  background:#c9a85d;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- ESQUERDA -->
<div class="left">

<div class="avatar"></div>

<input placeholder="Nome">
<input placeholder="Raça">
<input placeholder="Classe">
<input placeholder="Nível">
<input placeholder="Rank do Núcleo">

<h3>Bênção</h3>
<input placeholder="Deus">
<textarea placeholder="Descrição"></textarea>

</div>

<!-- DIREITA -->
<div class="right">

<div class="title">
<h2>Ficha de Personagem</h2>
</div>

<p>Pontos: <span id="pontos">30</span></p>

<!-- ATRIBUTOS -->
<div class="row">

<div class="box atributo">
FOR
<button onclick="diminuir('for')">-</button>
<input id="for" value="5" readonly>
<button onclick="aumentar('for')">+</button>
</div>

<div class="box atributo">
AGI
<button onclick="diminuir('agi')">-</button>
<input id="agi" value="5" readonly>
<button onclick="aumentar('agi')">+</button>
</div>

<div class="box atributo">
RES
<button onclick="diminuir('res')">-</button>
<input id="res" value="5" readonly>
<button onclick="aumentar('res')">+</button>
</div>

<div class="box atributo">
ENE
<button onclick="diminuir('ene')">-</button>
<input id="ene" value="5" readonly>
<button onclick="aumentar('ene')">+</button>
</div>

</div>

<div class="row">

<div class="box atributo">
PER
<button onclick="diminuir('per')">-</button>
<input id="per" value="5" readonly>
<button onclick="aumentar('per')">+</button>
</div>

<div class="box">HP<br><input></div>
<div class="box">DEF<br><input></div>
<div class="box">VEL<br><input></div>

</div>

<!-- RESTO IGUAL -->
<div class="row">
<div class="box">Tipo Núcleo<br><input></div>
<div class="box">Estado<br><input></div>
<div class="box">Energia<br><input></div>
<div class="box">Rank<br><input></div>
</div>

<div class="row">
<div class="box" style="grid-column: span 4;">
Habilidades<br>
<textarea rows="3"></textarea>
</div>
</div>

<div class="row">
<div class="box" style="grid-column: span 4;">
Equipamentos<br>
<textarea rows="2"></textarea>
</div>
</div>

<div class="row">
<div class="box" style="grid-column: span 4;">
História<br>
<textarea rows="3"></textarea>
</div>
</div>

<!-- DADOS -->
<div class="row">
<div class="box">
<button onclick="rolarD20()">D20</button>
<p id="d20"></p>
</div>

<div class="box">
<button onclick="rolarDano()">Dano</button>
<select id="tipo">
<option value="6">3d6</option>
<option value="4">3d4</option>
</select>
<p id="dano"></p>
</div>
</div>

</div>
</div>

<script>

// SISTEMA DE ATRIBUTOS
let pontos = 30;
let max = 15;
let min = 5;

function aumentar(id){
  let el = document.getElementById(id);
  let val = parseInt(el.value);

  if(pontos > 0 && val < max){
    el.value = val + 1;
    pontos--;
    atualizar();
  }
}

function diminuir(id){
  let el = document.getElementById(id);
  let val = parseInt(el.value);

  if(val > min){
    el.value = val - 1;
    pontos++;
    atualizar();
  }
}

function atualizar(){
  document.getElementById("pontos").innerText = pontos;
}

// DADOS
function rolarD20(){
 let r = Math.floor(Math.random()*20)+1;
 document.getElementById("d20").innerText = r;
}

function rolarDano(){
 let tipo = document.getElementById("tipo").value;
 let total = 0;
 let rolls = [];

 for(let i=0;i<3;i++){
   let r = Math.floor(Math.random()*tipo)+1;
   rolls.push(r);
   total += r;
 }

 document.getElementById("dano").innerText =
 rolls.join(", ") + " = " + total;
}

</script>

</body>
</html>
