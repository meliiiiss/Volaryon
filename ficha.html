<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volaryon Builder — Legacy of Gods</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            --bg: #05070a;
            --panel: rgba(13, 17, 23, 0.95);
            --gold: #c2a35d;
            --gold-low: rgba(194, 163, 93, 0.2);
            --text: #e0e0e0;
            --accent: #1a2433;
        }

        body {
            background: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .builder-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* PAINÉIS ESTILO PATHBUILDER */
        .card {
            background: var(--panel);
            border: 1px solid var(--gold);
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid var(--gold-low);
            pointer-events: none;
        }

        h2, h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            border-bottom: 1px solid var(--gold-low);
            padding-bottom: 8px;
        }

        /* INPUTS ESTILIZADOS */
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 5px; }
        
        input, select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold-low);
            color: white;
            padding: 8px;
            font-family: inherit;
            font-size: 16px;
        }

        input:focus { border-color: var(--gold); outline: none; }

        /* SIDEBAR DE ATRIBUTOS */
        .stat-block {
            display: grid;
            grid-template-columns: 1fr 60px 60px;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            background: var(--accent);
            padding: 10px;
            border-left: 3px solid var(--gold);
        }

        .stat-label { font-family: 'Cinzel', serif; font-weight: bold; }
        .stat-mod { color: var(--gold); font-weight: bold; text-align: center; font-size: 20px; }

        /* GRADE DE HABILIDADES */
        .abilities-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .hab-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--gold-low);
            padding: 10px;
            transition: 0.3s;
        }

        .hab-item:hover { border-color: var(--gold); }

        /* HEADER DO PERSONAGEM */
        .char-header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .char-portrait {
            width: 120px; height: 120px;
            border: 2px solid var(--gold);
            object-fit: cover;
            border-radius: 50%;
        }

        .header-info { flex: 1; }
        .resource-bar {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .resource { flex: 1; background: #000; border: 1px solid var(--gold-low); padding: 5px 10px; }

        .btn-roll {
            background: var(--gold);
            color: black;
            font-family: 'Cinzel', serif;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .builder-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="builder-container">
    <header class="card char-header">
        <img id="preview" src="https://i.pinimg.com/736x/8e/3c/0c/8e3c0c538a7c293630f576e8284643c1.jpg" class="char-portrait">
        <div class="header-info">
            <input type="text" placeholder="NOME DO PERSONAGEM" style="font-family: 'Cinzel'; font-size: 24px; border: none; background: transparent; padding: 0;">
            <div class="resource-bar">
                <div class="resource"><label>Vida (PV)</label><input type="text" value="25/25" style="border:none; text-align:center;"></div>
                <div class="resource"><label>Energia</label><input type="text" value="40/40" style="border:none; text-align:center;"></div>
                <div class="resource"><label>Defesa (CA)</label><div id="ca" style="text-align:center; font-size:20px; color:var(--gold);">10</div></div>
            </div>
        </div>
        <div style="text-align:right">
            <input type="file" id="img-input" onchange="carregarImagem(event)" style="display:none">
            <button onclick="document.getElementById('img-input').click()" class="btn-roll" style="width:auto; padding:5px 15px;">Alterar Foto</button>
        </div>
    </header>

    <aside class="card">
        <h3>Construção</h3>
        
        <div class="input-group">
            <label>Raça</label>
            <select id="raca" onchange="aplicarRaca()">
                <option value="">Selecione...</option>
                <option value="Humano">Humano</option>
                <option value="Elfyr">Elfyr</option>
                <option value="Durkhan">Durkhan</option>
                <option value="Sylvaris">Sylvaris</option>
                <option value="Infernyx">Infernyx</option>
            </select>
        </div>

        <div class="input-group">
            <label>Sub-Raça</label>
            <select id="subraca" onchange="aplicarSubRaca()"><option value="">—</option></select>
        </div>

        <div class="divider" style="margin: 20px 0;"></div>

        <h3>Atributos <span id="pontos" style="float:right; font-size:12px">30 pts</span></h3>
        
        <div id="stat-area">
            </div>

        <div class="card" style="margin-top:20px; background: rgba(0,0,0,0.4);">
            <h3 style="font-size:14px">Bênção Divina</h3>
            <div id="deus-nome" style="color:var(--gold); font-weight:bold; text-align:center; margin-bottom:10px;">? ? ?</div>
            <button class="btn-roll" onclick="sortearDeus()">Sortear D25</button>
        </div>
    </aside>

    <main style="display: flex; flex-direction: column; gap: 20px;">
        <section class="card">
            <h3>Habilidades de Classe</h3>
            <div class="abilities-grid" id="habilidades-container">
                </div>
        </section>

        <section class="card">
            <h3>Equipamento & Biografia</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <textarea rows="10" placeholder="Inventário..."></textarea>
                <textarea rows="10" placeholder="História do personagem..."></textarea>
            </div>
        </section>
    </main>
</div>

<script>
    const BASE = 5;
    const TOTAL_PONTOS = 30;
    const atributos = ["FOR", "AGI", "RES", "ENE", "PER"];

    const listaDeuses = [
        "Vorg-Xath (Gravidade)", "Khyllos (Portais)", "Zyn-Turok (Combate)", 
        "Oevari (Claridade)", "Xur-Ghaal (Decomposição)", "Myr-Vonn (Ressonância)", 
        "Jhaz-Kur (Vigor)", "Vaelen-Thys (Ordem)", "Grymx (Resistência)", 
        "Nyth-Ael (Inconsciente)", "Ryn-Zar (Magnetismo)", "Esh-Mora (Sacrifício)", 
        "Dra-Vulk (Profundezas)", "Syll-Ith (Crescimento)", "Hek-Vahl (Leis)", 
        "Ulyth (Ocultismo)", "Vorn-Kyra (Estrutura)", "Az-Rhyon (Espaço)", 
        "Kael-Zunn (Inverno)", "Bha-Ghul (Erosão)", "Myr-Dax (Antiguidade)", 
        "Phyx (Fluxo)", "Ynn-Sora (Instinto)", "Zar-Koth (Verdade)", 
        "Vol-Aeryn (Origem)"
    ];

    const racas = {
        Sylvaris: { bonus:{ENE:1,RES:1}, sub:[{nome:"Bestialis", b:{FOR:2}}, {nome:"Aeralis", b:{AGI:2}}, {nome:"Serphetes", b:{PER:2}}, {nome:"Amphiras", b:{RES:2}}, {nome:"Thalassyn", b:{ENE:2}}] },
        Infernyx: { bonus:{ENE:2,FOR:1}, sub:[{nome:"Sanguinarch", b:{ENE:2}}, {nome:"Nachryx", b:{FOR:2}}, {nome:"Damazti", b:{RES:2}}, {nome:"Bansharyn", b:{PER:2}},  {nome:"Linchnyx", b:{ENE:2}}] },                                     
        Elfyr: { bonus:{ENE:1,RES:1}, sub:[{nome:"Forestis", b:{ENE:1}}, {nome:"Lunaris", b:{AGI:2}}] },
        Durkhan: { bonus:{FOR:2,RES:1}, sub:[{nome:"Ferrun", b:{FOR:2}}, {nome:"Everest", b:{RES:2}}] },
        Humano: { bonus:{FOR:1,AGI:1,RES:1}, sub:[{nome:"Versátil", b:{}}] }
    };

    function carregarImagem(e) {
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(e.target.files[0]);
    }

    function sortearDeus() {
        const r = Math.floor(Math.random() * 25);
        document.getElementById("deus-nome").innerText = listaDeuses[r];
    }

    function aplicarRaca() {
        let r = racas[document.getElementById("raca").value];
        let sub = document.getElementById("subraca");
        sub.innerHTML = '<option value="">—</option>';
        if(r) {
            r.sub.forEach(s => {
                let o = document.createElement("option");
                o.value = s.nome; o.textContent = s.nome;
                sub.appendChild(o);
            });
        }
        calc();
    }

    function mod(v) { return Math.floor((v - 10) / 2); }

    function calc() {
        let gasto = 0;
        atributos.forEach(a => {
            let v = +document.getElementById(a).value;
            gasto += (v - BASE);
            let m = mod(v);
            document.getElementById("m" + a).innerText = (m >= 0 ? "+" : "") + m;
        });
        document.getElementById("pontos").innerText = (TOTAL_PONTOS - gasto) + " pts";
        document.getElementById("ca").innerText = 10 + mod(+document.getElementById("AGI").value);
    }

    // Inicializar Atributos
    const statArea = document.getElementById("stat-area");
    atributos.forEach(a => {
        statArea.innerHTML += `
            <div class="stat-block">
                <span class="stat-label">${a}</span>
                <input id="${a}" type="number" value="5" oninput="calc()">
                <span class="stat-mod" id="m${a}">+0</span>
            </div>
        `;
    });

    // Inicializar Habilidades (8 slots)
    const habContainer = document.getElementById("habilidades-container");
    for(let i=1; i<=8; i++) {
        habContainer.innerHTML += `
            <div class="hab-item">
                <input placeholder="Habilidade ${i}" style="border:none; background:transparent; color:var(--gold); font-weight:bold; padding:0;">
                <textarea placeholder="Efeito..." style="border:none; background:transparent; font-size:13px; height:35px; width:100%; margin-top:5px; color:#bbb;"></textarea>
            </div>
        `;
    }

    calc();
</script>

</body>
</html>
