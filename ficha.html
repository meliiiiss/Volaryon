<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha Volaryon</title>

<style>
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    background: #0d0f14;
    color: #e6d3a3;
}

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
}

/* LADO ESQUERDO */
.left {
    border-right: 2px solid #c9a85d;
    padding: 10px;
}

.avatar {
    width: 100%;
    height: 260px;
    border: 2px solid #c9a85d;
    margin-bottom: 10px;
    background: #222;
}

.left input {
    width: 100%;
    margin-bottom: 5px;
}

/* LADO DIREITO */
.right {
    padding: 10px;
}

/* LINHAS */
.row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-bottom: 5px;
}

.box {
    border: 1px solid #c9a85d;
    padding: 5px;
}

.box input, .box textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
}

/* TÍTULO */
.title {
    text-align: center;
    border-bottom: 2px solid #c9a85d;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ESQUERDA -->
<div class="left">

<div class="avatar"></div>

<input placeholder="Nome">
<input placeholder="Raça">
<input placeholder="Classe">
<input placeholder="Nível">
<input placeholder="Rank do Núcleo">

<h3>Bênção</h3>
<input placeholder="Deus">
<textarea placeholder="Descrição"></textarea>

</div>

<!-- DIREITA -->
<div class="right">

<div class="title">
<h2>Ficha de Personagem</h2>
</div>

<!-- ATRIBUTOS -->
<div class="row">
<div class="box">FOR<br><input type="number"></div>
<div class="box">AGI<br><input type="number"></div>
<div class="box">RES<br><input type="number"></div>
<div class="box">ENE<br><input type="number"></div>
</div>

<div class="row">
<div class="box">PER<br><input type="number"></div>
<div class="box">HP<br><input></div>
<div class="box">DEF<br><input></div>
<div class="box">VEL<br><input></div>
</div>

<!-- NÚCLEO -->
<div class="row">
<div class="box">Tipo Núcleo<br><input></div>
<div class="box">Estado<br><input></div>
<div class="box">Energia<br><input></div>
<div class="box">Rank<br><input></div>
</div>

<!-- HABILIDADES -->
<div class="row">
<div class="box" style="grid-column: span 4;">
Habilidades<br>
<textarea rows="3"></textarea>
</div>
</div>

<!-- EQUIPAMENTOS -->
<div class="row">
<div class="box" style="grid-column: span 4;">
Equipamentos<br>
<textarea rows="2"></textarea>
</div>
</div>

<!-- HISTÓRIA -->
<div class="row">
<div class="box" style="grid-column: span 4;">
História<br>
<textarea rows="3"></textarea>
</div>
</div>

<!-- DADOS -->
<div class="row">
<div class="box">
<button onclick="rolarD20()">D20</button>
<p id="d20"></p>
</div>

<div class="box">
<button onclick="rolarDano()">Dano</button>
<select id="tipo">
<option value="6">3d6</option>
<option value="4">3d4</option>
</select>
<p id="dano"></p>
</div>
</div>

</div>

</div>

<script>
function rolarD20(){
 let r = Math.floor(Math.random()*20)+1;
 document.getElementById("d20").innerText = r;
}

function rolarDano(){
 let tipo = document.getElementById("tipo").value;
 let total = 0;
 let rolls = [];

 for(let i=0;i<3;i++){
   let r = Math.floor(Math.random()*tipo)+1;
   rolls.push(r);
   total += r;
 }

 document.getElementById("dano").innerText =
 rolls.join(", ") + " = " + total;
}
</script>

</body>
</html>
