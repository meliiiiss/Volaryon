<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha Volaryon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0b0c10;
    color:#e6d3a3;
    font-family:'EB Garamond', serif;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
    border:1px solid #c9a85d;
}

/* TOPO */
.top{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:10px;
}

/* PAINEL */
.panel{
    border:1px solid #c9a85d;
    padding:10px;
    background:#111;
}

/* TITULO */
.title{
    text-align:center;
    font-family:'Cinzel';
    font-size:40px;
    color:#c9a85d;
}

.subtitle{
    text-align:center;
    font-size:12px;
    letter-spacing:3px;
}

/* INPUT BONITO */
input, select, textarea{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid #c9a85d;
    color:white;
}

/* ATRIBUTOS */
.stats{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
}

.stat{
    border:1px solid #c9a85d;
    text-align:center;
    padding:5px;
}

/* BOTÃO */
.btn{
    background:#c9a85d;
    border:none;
    padding:10px;
    width:100%;
    margin-top:10px;
    cursor:pointer;
}

/* PERSONAGENS */
.lista{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.char{
    width:120px;
    height:150px;
    border:1px solid #c9a85d;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<div class="container">

<div class="title">VOLARYON</div>
<div class="subtitle">CRIAÇÃO DE PERSONAGEM</div>

<div class="top">

<div class="panel">
<input id="nome" placeholder="Nome">

<select id="raca" onchange="aplicarRaca()">
<option>Humano</option>
<option>Elfo</option>
<option>Orc</option>
</select>

<select id="classe" onchange="aplicarClasse()">
<option>Guerreiro</option>
<option>Mago</option>
<option>Assassino</option>
</select>

<select id="deus" onchange="aplicarDeus()">
<option>Sol</option>
<option>Lua</option>
<option>Caos</option>
</select>
</div>

<div class="panel">
<h3>Atributos</h3>

<div class="stats">
<div class="stat">FOR<input type="number" id="for" value="5" onchange="calc()"></div>
<div class="stat">AGI<input type="number" id="agi" value="5" onchange="calc()"></div>
<div class="stat">RES<input type="number" id="res" value="5" onchange="calc()"></div>
<div class="stat">PER<input type="number" id="per" value="5" onchange="calc()"></div>
<div class="stat">ENE<input type="number" id="ene" value="5" onchange="calc()"></div>
</div>

<p id="resto">Pontos: 30</p>

</div>

<div class="panel">

<h3>Bênção</h3>
<textarea id="passiva"></textarea>

<h3>Habilidade</h3>
<textarea id="habilidade"></textarea>

</div>

</div>

<button class="btn" onclick="salvar()">SALVAR PERSONAGEM</button>

<div class="lista" id="lista"></div>

</div>

<script>

// LIMITE DE PONTOS
function calc(){
 let total = +for.value + +agi.value + +res.value + +per.value + +ene.value;
 let resto = 55 - total;

 document.getElementById("resto").innerText = "Pontos: " + resto;

 if(resto < 0){
   alert("Passou do limite!");
 }
}

// RAÇA
function aplicarRaca(){
 if(raca.value == "Elfo"){
   agi.value = +agi.value + 2;
 }
 if(raca.value == "Orc"){
   for.value = +for.value + 2;
 }
}

// CLASSE
function aplicarClasse(){
 if(classe.value == "Guerreiro"){
   res.value = +res.value + 2;
 }
 if(classe.value == "Mago"){
   ene.value = +ene.value + 2;
 }
}

// DEUS
function aplicarDeus(){
 if(deus.value == "Sol"){
   passiva.value = "Regeneração leve";
   habilidade.value = "Explosão Solar";
 }
 if(deus.value == "Lua"){
   passiva.value = "Visão aprimorada";
   habilidade.value = "Ilusão Lunar";
 }
 if(deus.value == "Caos"){
   passiva.value = "Dano imprevisível";
   habilidade.value = "Ruptura do Caos";
 }
}

// SALVAR
function salvar(){
 let nome = document.getElementById("nome").value;

 let div = document.createElement("div");
 div.className = "char";
 div.innerText = nome;

 document.getElementById("lista").appendChild(div);
}

</script>

</body>
</html>
