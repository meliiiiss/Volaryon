<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Volaryon • Home</title>

  <link rel="stylesheet" href="CSS/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville&display=swap" rel="stylesheet">

</head>

<body>

  <!-- FUNDO -->

  <video
    class="bg-video"
    autoplay
    muted
    loop
    playsinline
  >

    <source
      src="assets/videos/snaptik_7588938927608794399_hd.mp4"
      type="video/mp4"
    >

  </video>

  <!-- OVERLAY -->

  <div class="bg-dark"></div>

  <!-- TOPO -->

  <header class="top-ui">

    <div class="player-box">

      <div class="player-avatar"></div>

      <div>
        <h3>Melissa</h3>
        <span>Desperta • Nível 1</span>
      </div>

    </div>

    <div class="top-menu">

      <span>✦ 13.880</span>

      <span>⬢ 900</span>

      <span>⚙</span>

    </div>

  </header>

  <!-- HERO -->

  <section class="hero-home">

    <div class="hero-info">

      <span class="subtitle">
        O Véu Desperto
      </span>

      <h1>
        VOLARYON
      </h1>

      <p>
        As fronteiras entre os mundos ruíram.
        Apenas os Despertos conseguem sobreviver
        às entidades além do Véu.
      </p>

      <button class="play-button">
        ▶ INICIAR JORNADA
      </button>

    </div>

  </section>

  <!-- MENU INFERIOR -->

  <nav class="bottom-menu">

    <button class="active">
      Home
    </button>

    <button>
      Perfil
    </button>

    <button>
      Grimório
    </button>

    <button>
      Inventário
    </button>

    <button>
      Clãs
    </button>

  </nav>

  <!-- ÁUDIO -->

  <audio id="bgMusic" loop>

    <source
      src="assets/audio/musica.mp3"
      type="audio/mpeg"
    >

  </audio>

  <script src="js/script.js"></script>

</body>
</html>
